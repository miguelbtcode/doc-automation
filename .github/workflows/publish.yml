name: Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_FILE: 'doc-automation.slnx'
  WEB_PROJECT: 'src/DocAutomation.Web/DocAutomation.Web.csproj'
  RUNTIME: 'win-x64'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish-web:
    name: Publish Web (IIS — win-x64)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.WEB_PROJECT }}

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.0-ci.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Publish Web for IIS
        run: |
          dotnet publish ${{ env.WEB_PROJECT }} \
            --configuration ${{ github.event.inputs.configuration || 'Release' }} \
            --runtime ${{ env.RUNTIME }} \
            --self-contained false \
            --output ./publish \
            /p:UseAppHost=false \
            /p:Version=${{ steps.version.outputs.version }} \
            /p:AssemblyVersion=${{ steps.version.outputs.version }}.0 \
            /p:FileVersion=${{ steps.version.outputs.version }}.0

      - name: Create deployment package (zip)
        run: |
          cd publish
          zip -r ../doc-automation-web-${{ steps.version.outputs.version }}.zip .
          cd ..
          ls -lh doc-automation-web-*.zip

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: doc-automation-web-${{ steps.version.outputs.version }}
          path: doc-automation-web-*.zip
          retention-days: 90

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: doc-automation-web-*.zip
