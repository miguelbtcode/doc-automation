name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "22"
  SOLUTION_FILE: "doc-automation.slnx"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/DocAutomation.Web/editor/package-lock.json

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install editor dependencies
        run: npm ci --no-audit --no-fund
        working-directory: src/DocAutomation.Web/editor

      - name: Build editor bundle
        run: npm run build
        working-directory: src/DocAutomation.Web/editor

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore /warnaserror

      - name: Test
        run: |
          if find . -name "*.Tests.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | grep -q .; then
            dotnet test ${{ env.SOLUTION_FILE }} \
              --configuration Release \
              --no-build \
              --verbosity normal \
              --logger "trx;LogFileName=test-results.trx" \
              --results-directory ./test-results \
              --collect:"XPlat Code Coverage"
          else
            echo "No test projects found — skipping test step."
          fi

      - name: Upload test results
        if: always() && hashFiles('test-results/**/*.trx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Publish test report
        if: always() && hashFiles('test-results/**/*.trx') != ''
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
